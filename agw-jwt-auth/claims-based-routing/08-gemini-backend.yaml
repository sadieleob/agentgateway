apiVersion: v1
kind: Secret
metadata:
  name: gemini-api-key
  namespace: agentgateway-system
type: Opaque
stringData:
  Authorization: "${GEMINI_API_KEY}"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: gemini-llm
  namespace: agentgateway-system
spec:
  ai:
    provider:
      gemini: {}
  policies:
    auth:
      secretRef:
        name: gemini-api-key
