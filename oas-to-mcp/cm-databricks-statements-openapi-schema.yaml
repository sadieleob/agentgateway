    type identifier"},"memory_mb":{"type":"integer","description":"Memory in MB"},"num_cores":{"type":"number","description":"Number
    of cores"}}}}}}}}}}}},"/api/2.2/jobs/list":{"get":{"summary":"List jobs","description":"List
    all jobs in the workspace","operationId":"list_jobs","tags":["jobs"],"responses":{"200":{"description":"List
    of jobs","content":{"application/json":{"schema":{"type":"object","properties":{"jobs":{"type":"array","items":{"$ref":"#/components/schemas/Job"}}}}}}}}}},"/api/2.2/jobs/create":{"post":{"summary":"Create
    job","description":"Create a new job","operationId":"create_job","tags":["jobs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateJobRequest"}}}},"responses":{"200":{"description":"Job
    created successfully","content":{"application/json":{"schema":{"type":"object","properties":{"job_id":{"type":"integer","format":"int64","description":"The
    canonical identifier for the newly created job"}}}}}}}}},"/api/2.2/jobs/run-now":{"post":{"summary":"Trigger
    a new job run","description":"Run a job immediately","operationId":"runnow","tags":["jobs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"job_id":{"type":"integer","description":"The
    ID of the job to run"},"notebook_params":{"type":"object","description":"Parameters
    for the job"}}}}}},"responses":{"200":{"description":"Job run initiated","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Run"}}}}}}},"/api/2.2/jobs/runs/list":{"get":{"summary":"List
    job runs","description":"List runs for a job","operationId":"list_job_runs","tags":["jobs"],"parameters":[{"name":"job_id","in":"query","required":true,"schema":{"type":"integer"},"description":"The
    ID of the job"},{"name":"active_only","in":"query","schema":{"type":"boolean"},"description":"Whether
    to return only active runs"},{"name":"completed_only","in":"query","schema":{"type":"boolean"},"description":"Whether
    to return only completed runs"},{"name":"offset","in":"query","schema":{"type":"integer"},"description":"Offset
    for pagination"},{"name":"limit","in":"query","schema":{"type":"integer"},"description":"Limit
    for pagination"}],"responses":{"200":{"description":"List of job runs","content":{"application/json":{"schema":{"type":"object","properties":{"runs":{"type":"array","items":{"$ref":"#/components/schemas/Run"}}}}}}}}}},"/api/2.2/jobs/get":{"get":{"summary":"Get
    a single job","description":"Retrieves the details for a single job","operationId":"get_job","tags":["jobs"],"parameters":[{"name":"job_id","in":"query","required":true,"schema":{"type":"integer"},"description":"The
    canonical identifier of the job"}],"responses":{"200":{"description":"Job details","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Job"}}}}}}},"/api/2.2/jobs/delete":{"post":{"summary":"Delete
    a job","description":"Deletes a job","operationId":"delete_job","tags":["jobs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["job_id"],"properties":{"job_id":{"type":"integer","description":"The
    canonical identifier of the job to delete"}}}}}},"responses":{"200":{"description":"Job
    deleted successfully"}}}},"/api/2.2/jobs/reset":{"post":{"summary":"Update all
    job settings (reset)","description":"Overwrite all settings for the given job.
    Use the update endpoint to update job settings partially","operationId":"reset_job","tags":["jobs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"allOf":[{"$ref":"#/components/schemas/CreateJobRequest"},{"type":"object","required":["job_id"],"properties":{"job_id":{"type":"integer","description":"The
    canonical identifier of the job to reset"}}}]}}}},"responses":{"200":{"description":"Job
    settings reset successfully"}}}},"/api/2.2/jobs/update":{"post":{"summary":"Update
    job settings partially","description":"Add, update, or remove specific settings
    of an existing job. Use the reset endpoint to overwrite all job settings","operationId":"update_job","tags":["jobs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["job_id"],"properties":{"job_id":{"type":"integer","description":"The
    canonical identifier of the job to update"},"fields_to_remove":{"type":"array","items":{"type":"string"},"description":"List
    of fields to remove"},"new_settings":{"type":"object","description":"The new settings
    for the job"}}}}}},"responses":{"200":{"description":"Job updated successfully"}}}},"/api/2.2/jobs/runs/get":{"get":{"summary":"Get
    a single job run","description":"Retrieve the metadata of a run","operationId":"get_run","tags":["jobs"],"parameters":[{"name":"run_id","in":"query","required":true,"schema":{"type":"integer"},"description":"The
    canonical identifier of the run for which to retrieve the metadata"}],"responses":{"200":{"description":"Run
    details","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Run"}}}}}}},"/api/2.2/jobs/runs/cancel":{"post":{"summary":"Cancel
    a run","description":"Cancels a job run. The run is canceled asynchronously","operationId":"cancel_run","tags":["jobs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["run_id"],"properties":{"run_id":{"type":"integer","description":"The
    canonical identifier of the run to cancel"}}}}}},"responses":{"200":{"description":"Run
    cancellation initiated"}}}},"/api/2.2/jobs/runs/get-output":{"get":{"summary":"Get
    the output for a single run","description":"Retrieve the output and metadata of
    a single task run","operationId":"get_run_output","tags":["jobs"],"parameters":[{"name":"run_id","in":"query","required":true,"schema":{"type":"integer"},"description":"The
    canonical identifier for the run"}],"responses":{"200":{"description":"Run output","content":{"application/json":{"schema":{"type":"object","properties":{"metadata":{"$ref":"#/components/schemas/Run"},"error":{"type":"string","description":"The
    error message if the run failed"},"notebook_output":{"type":"object","description":"The
    output from a notebook task"}}}}}}}}},"/api/2.0/workspace/list":{"get":{"summary":"List
    workspace items","description":"List items in the workspace","operationId":"list_workspace_items","tags":["workspace"],"parameters":[{"name":"path","in":"query","required":true,"schema":{"type":"string"},"description":"The
    workspace path"}],"responses":{"200":{"description":"List of workspace items","content":{"application/json":{"schema":{"type":"object","properties":{"objects":{"type":"array","items":{"$ref":"#/components/schemas/ObjectInfo"}}}}}}}}}},"/api/2.0/workspace/get-status":{"get":{"summary":"Get
    workspace item status","description":"Get status of a workspace item","operationId":"get_workspace_status","tags":["workspace"],"parameters":[{"name":"path","in":"query","required":true,"schema":{"type":"string"},"description":"The
    workspace path"}],"responses":{"200":{"description":"Workspace item status","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ObjectInfo"}}}}}}},"/api/2.0/workspace/import":{"post":{"summary":"Import
