    workspace path"},"format":{"type":"string","enum":["SOURCE","HTML","JUPYTER","DBC","R_MARKDOWN"],"description":"The
    format of the file"},"language":{"type":"string","enum":["SCALA","PYTHON","SQL","R"],"description":"The
    language of the file"},"content":{"type":"string","description":"The base64-encoded
    content"},"overwrite":{"type":"boolean","description":"Whether to overwrite existing
    files"}}}}}},"responses":{"200":{"description":"Item imported successfully"}}}},"/api/2.0/workspace/export":{"get":{"summary":"Export
    workspace item","description":"Export a workspace item","operationId":"export_workspace_item","tags":["workspace"],"parameters":[{"name":"path","in":"query","required":true,"schema":{"type":"string"},"description":"The
    workspace path"},{"name":"format","in":"query","schema":{"type":"string","enum":["SOURCE","HTML","JUPYTER","DBC","R_MARKDOWN"]},"description":"The
    export format"},{"name":"direct_download","in":"query","schema":{"type":"boolean"},"description":"Whether
    to return direct download link"}],"responses":{"200":{"description":"Exported
    content","content":{"application/json":{"schema":{"type":"object","properties":{"content":{"type":"string","description":"The
    base64-encoded content"}}}}}}}}},"/api/2.0/dbfs/list":{"get":{"summary":"List
    DBFS items","description":"List items in the Databricks File System","operationId":"list_dbfs_items","tags":["dbfs"],"parameters":[{"name":"path","in":"query","required":true,"schema":{"type":"string"},"description":"The
    DBFS path"}],"responses":{"200":{"description":"List of DBFS items","content":{"application/json":{"schema":{"type":"object","properties":{"files":{"type":"array","items":{"$ref":"#/components/schemas/FileInfo"}}}}}}}}}},"/api/2.0/dbfs/put":{"post":{"summary":"Upload
    file to DBFS","description":"Upload a file to the Databricks File System","operationId":"put_dbfs_file","tags":["dbfs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"path":{"type":"string","description":"The
    DBFS path"},"contents":{"type":"string","description":"The base64-encoded file
    contents"},"overwrite":{"type":"boolean","description":"Whether to overwrite existing
    files"}}}}}},"responses":{"200":{"description":"File uploaded successfully"}}}},"/api/2.0/dbfs/read":{"get":{"summary":"Get
    the contents of a file","description":"Returns the contents of a file from the
    Databricks File System. If you want to download a large file, use the streaming
    API (create/addblock/close)","operationId":"read_dbfs_file","tags":["dbfs"],"parameters":[{"name":"path","in":"query","required":true,"schema":{"type":"string"},"description":"The
    absolute DBFS path to the file"},{"name":"offset","in":"query","schema":{"type":"integer"},"description":"The
    offset to read from in bytes"},{"name":"length","in":"query","schema":{"type":"integer"},"description":"The
    number of bytes to read starting from the offset. This has a limit of 1 MB"}],"responses":{"200":{"description":"File
    contents","content":{"application/json":{"schema":{"type":"object","properties":{"bytes_read":{"type":"integer","description":"The
    number of bytes read"},"data":{"type":"string","description":"The base64-encoded
    contents of the file"}}}}}}}}},"/api/2.0/dbfs/delete":{"post":{"summary":"Delete
    a file/directory","description":"Delete the file or directory at the given path
    (recursive delete for directories)","operationId":"delete_dbfs_file","tags":["dbfs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["path"],"properties":{"path":{"type":"string","description":"The
    absolute path of the file or directory to delete"},"recursive":{"type":"boolean","description":"Whether
    to delete directories recursively"}}}}}},"responses":{"200":{"description":"File
    or directory deleted successfully"}}}},"/api/2.0/dbfs/mkdirs":{"post":{"summary":"Create
    a directory","description":"Create the given directory and all necessary parent
    directories","operationId":"mkdirs_dbfs","tags":["dbfs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["path"],"properties":{"path":{"type":"string","description":"The
    absolute path of the directory to create"}}}}}},"responses":{"200":{"description":"Directory
    created successfully"}}}},"/api/2.0/dbfs/get-status":{"get":{"summary":"Get the
    information of a file or directory","description":"Get the file information of
    a file or directory","operationId":"get_dbfs_status","tags":["dbfs"],"parameters":[{"name":"path","in":"query","required":true,"schema":{"type":"string"},"description":"The
    absolute path of the file or directory"}],"responses":{"200":{"description":"File
    or directory information","content":{"application/json":{"schema":{"$ref":"#/components/schemas/FileInfo"}}}}}}},"/api/2.0/dbfs/move":{"post":{"summary":"Move
    a file","description":"Move a file or directory from one location to another","operationId":"move_dbfs_file","tags":["dbfs"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["source_path","destination_path"],"properties":{"source_path":{"type":"string","description":"The
    absolute path of the source file or directory"},"destination_path":{"type":"string","description":"The
    absolute path of the destination file or directory"}}}}}},"responses":{"200":{"description":"File
    or directory moved successfully"}}}},"/api/2.0/preview/scim/v2/Users":{"get":{"summary":"List
    users","description":"List all users in the workspace","operationId":"list_users","tags":["users"],"responses":{"200":{"description":"List
    of users","content":{"application/json":{"schema":{"type":"object","properties":{"users":{"type":"array","items":{"$ref":"#/components/schemas/User"}}}}}}}}},"post":{"summary":"Create
    user","description":"Create a new user","operationId":"create_user","tags":["users"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateUserRequest"}}}},"responses":{"200":{"description":"User
    created successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/User"}}}}}}},"/api/2.0/preview/scim/v2/Groups":{"get":{"summary":"List
    groups","description":"List all groups in the workspace","operationId":"list_groups","tags":["groups"],"responses":{"200":{"description":"List
    of groups","content":{"application/json":{"schema":{"type":"object","properties":{"group_names":{"type":"array","items":{"type":"string"}}}}}}}}},"post":{"summary":"Create
    group","description":"Create a new group","operationId":"create_group","tags":["groups"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"group_name":{"type":"string","description":"The
    name of the group"}}}}}},"responses":{"200":{"description":"Group created successfully"}}}},"/api/2.0/secrets/list":{"get":{"summary":"List
    secrets","description":"List secrets in a scope","operationId":"list_secrets","tags":["secrets"],"parameters":[{"name":"scope","in":"query","required":true,"schema":{"type":"string"},"description":"The
    secret scope name"}],"responses":{"200":{"description":"List of secrets","content":{"application/json":{"schema":{"type":"object","properties":{"secrets":{"type":"array","items":{"$ref":"#/components/schemas/SecretMetadata"}}}}}}}}}},"/api/2.0/secrets/put":{"post":{"summary":"Create
    or update secret","description":"Create or update a secret","operationId":"put_secret","tags":["secrets"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"scope":{"type":"string","description":"The
    secret scope name"},"key":{"type":"string","description":"The secret key"},"string_value":{"type":"string","description":"The
    secret value"}}}}}},"responses":{"200":{"description":"Secret created or updated
    successfully"}}}},"/api/2.0/sql/warehouses":{"get":{"summary":"List warehouses","description":"List
    all SQL warehouses that a user has access to","operationId":"list_warehouses","tags":["warehouses"],"parameters":[{"name":"run_as_user_id","in":"query","schema":{"type":"integer"},"description":"Service
    Principal which will be used to fetch the list of endpoints"},{"name":"page_size","in":"query","schema":{"type":"integer"},"description":"The
    max number of warehouses to return"},{"name":"page_token","in":"query","schema":{"type":"string"},"description":"A
    page token, received from a previous ListWarehouses call"}],"responses":{"200":{"description":"List
    of SQL warehouses","content":{"application/json":{"schema":{"type":"object","properties":{"warehouses":{"type":"array","items":{"$ref":"#/components/schemas/EndpointInfo"}},"next_page_token":{"type":"string","description":"A
    token to retrieve the next page"}}}}}}}},"post":{"summary":"Create a warehouse","description":"Create
    a new SQL warehouse","operationId":"create_warehouse","tags":["warehouses"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateWarehouseRequest"}}}},"responses":{"200":{"description":"SQL
    warehouse created successfully","content":{"application/json":{"schema":{"type":"object","properties":{"id":{"type":"string","description":"Id
    for the SQL warehouse"}}}}}}}}},"/api/2.0/sql/warehouses/{id}":{"get":{"summary":"Get
    warehouse info","description":"Gets the information for a single SQL warehouse
    by its ID","operationId":"get_warehouse","tags":["warehouses"],"parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string"},"description":"The
    ID of the SQL warehouse"}],"responses":{"200":{"description":"Warehouse information","content":{"application/json":{"schema":{"$ref":"#/components/schemas/EndpointInfo"}}}}}},"delete":{"summary":"Delete
    a warehouse","description":"Deletes a SQL warehouse","operationId":"delete_warehouse","tags":["warehouses"],"parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string"},"description":"The
    ID of the SQL warehouse to delete"}],"responses":{"200":{"description":"Warehouse
    deleted successfully"}}}},"/api/2.0/sql/warehouses/{id}/start":{"post":{"summary":"Start
    a warehouse","description":"Starts a SQL warehouse","operationId":"start_warehouse","tags":["warehouses"],"parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string"},"description":"The
    ID of the SQL warehouse to start"}],"responses":{"200":{"description":"Warehouse
    start initiated","content":{"application/json":{"schema":{"type":"object"}}}}}}},"/api/2.0/sql/warehouses/{id}/stop":{"post":{"summary":"Stop
    a warehouse","description":"Stops a SQL warehouse","operationId":"stop_warehouse","tags":["warehouses"],"parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string"},"description":"The
    ID of the SQL warehouse to stop"}],"responses":{"200":{"description":"Warehouse
    stop initiated","content":{"application/json":{"schema":{"type":"object"}}}}}}},"/api/2.0/sql/warehouses/{id}/edit":{"post":{"summary":"Update
    a warehouse","description":"Updates the configuration for a SQL warehouse. This
    is an incremental edit functionality, so all fields are optional. If a field is
    set, the corresponding configuration in the SQL warehouse is modified. If a field
    is unset, the existing configuration value in the SQL warehouse is retained.","operationId":"edit_warehouse","tags":["warehouses"],"parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string"},"description":"The
    ID of the warehouse to update"}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"name":{"type":"string","description":"Logical
    name for the cluster","maxLength":100},"cluster_size":{"type":"string","description":"Size
    of the clusters allocated for this warehouse","enum":["2X-Small","X-Small","Small","Medium","Large","X-Large","2X-Large","3X-Large","4X-Large"]},"min_num_clusters":{"type":"integer","description":"Minimum
    number of available clusters that will be maintained","minimum":1},"max_num_clusters":{"type":"integer","description":"Maximum
    number of clusters that the autoscaler will create","minimum":1,"maximum":40},"auto_stop_mins":{"type":"integer","description":"The
    amount of time in minutes that a SQL warehouse must be idle before it is automatically
    stopped","minimum":0},"creator_name":{"type":"string","description":"Warehouse
    creator name"},"enable_photon":{"type":"boolean","description":"Configures whether
    the warehouse should use Photon optimized clusters"},"enable_serverless_compute":{"type":"boolean","description":"Configures
    whether the warehouse should use serverless compute"},"instance_profile_arn":{"type":"string","description":"Deprecated.
    Instance profile used to pass IAM role to the cluster"},"spot_instance_policy":{"type":"string","enum":["POLICY_UNSPECIFIED","COST_OPTIMIZED","RELIABILITY_OPTIMIZED"],"description":"Configurations
    whether the endpoint should use spot instances"},"tags":{"type":"object","description":"A
    set of key-value pairs that will be tagged on all resources","additionalProperties":{"type":"string"}},"warehouse_type":{"type":"string","enum":["TYPE_UNSPECIFIED","CLASSIC","PRO"],"description":"Warehouse
    type PRO or CLASSIC"},"channel":{"type":"object","description":"Channel Details","properties":{"name":{"type":"string","enum":["CHANNEL_NAME_PREVIEW"]},"dbsql_version":{"type":"string"}}}}}}}},"responses":{"200":{"description":"Warehouse
    updated successfully","content":{"application/json":{"schema":{"type":"object"}}}}}}},"/api/2.0/preview/sql/queries":{"get":{"summary":"List
