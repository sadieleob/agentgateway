apiVersion: v1
data:
  schema: '{"openapi":"3.0.3","info":{"title":"Databricks","description":"Databricks
    is a unified analytics platform that accelerates innovation by unifying data science,
    engineering, and business analytics.\nIt provides a collaborative environment
    for data teams to build, deploy, and manage data and AI solutions at scale.\n\nKey
    Features:\n- Unified analytics platform for data science, engineering, and business
    analytics\n- Collaborative workspace for data teams and stakeholders\n- Advanced
    data processing with Apache Spark and Delta Lake\n- Machine learning and AI capabilities
    with MLflow integration\n- Real-time data streaming and processing\n- Data governance
    and security with Unity Catalog\n- Interactive notebooks and SQL analytics\n-
    Automated cluster management and scaling\n- Integration with popular data sources
    and tools\n- Enterprise-grade security and compliance features\n","version":"1.0.0","contact":{"name":"Databricks
    API Documentation","url":"https://docs.databricks.com/api/workspace/introduction"},"license":{"name":"Databricks
    Terms of Service","url":"https://www.databricks.com/legal/terms-of-use"}},"servers":[{"url":"","description":"Databricks
    workspace API","variables":{"workspace_url":{"description":"Your Databricks workspace
    URL","default":"your-workspace.cloud.databricks.com"}}}],"security":[{"bearerAuth":[]},{"basicAuth":[]}],"tags":[{"name":"clusters","description":"Cluster
    management operations"},{"name":"jobs","description":"Job management and execution"},{"name":"notebooks","description":"Notebook
    operations and management"},{"name":"workspace","description":"Workspace and file
    system operations"},{"name":"libraries","description":"Library management"},{"name":"secrets","description":"Secret
    management"},{"name":"permissions","description":"Permission and access control"},{"name":"users","description":"User
    management"},{"name":"groups","description":"Group management"},{"name":"service-principals","description":"Service
    principal management"},{"name":"instance-pools","description":"Instance pool management"},{"name":"global-init-scripts","description":"Global
    initialization scripts"},{"name":"dbfs","description":"Databricks File System
    operations"},{"name":"repos","description":"Repository management"},{"name":"git-credentials","description":"Git
    credentials management"},{"name":"token-management","description":"Personal access
    token management"},{"name":"workspace-conf","description":"Workspace configuration"},{"name":"storage","description":"Storage
    operations"},{"name":"unity-catalog","description":"Unity Catalog operations"},{"name":"sql","description":"SQL
    analytics operations"},{"name":"warehouses","description":"SQL warehouse management"},{"name":"alerts","description":"Alert
    management"},{"name":"dashboards","description":"Dashboard management"},{"name":"queries","description":"Query
    management"},{"name":"data-sources","description":"Data source management"},{"name":"model-registry","description":"MLflow
    model registry operations"},{"name":"experiments","description":"MLflow experiments
    management"},{"name":"webhooks","description":"Webhook management"},{"name":"marketplace","description":"Marketplace
    operations"},{"name":"lineage","description":"Data lineage operations"},{"name":"governance","description":"Data
    governance operations"}],"paths":{"/api/2.1/clusters/list":{"get":{"summary":"List
    clusters","description":"Return information about all pinned and active clusters,
    and all clusters terminated within the last 30 days","operationId":"list_clusters","tags":["clusters"],"parameters":[{"name":"filter_by","in":"query","schema":{"type":"object"},"description":"Filters
    to apply to the list of clusters"},{"name":"page_token","in":"query","schema":{"type":"string"},"description":"Use
    next_page_token or prev_page_token returned from the previous request to list
    the next or previous page of clusters respectively"},{"name":"page_size","in":"query","schema":{"type":"integer","minimum":1,"maximum":100,"default":20},"description":"Use
    this field to specify the maximum number of results to be returned by the server.
    The server may further constrain the maximum number of results returned in a single
    page"},{"name":"sort_by","in":"query","schema":{"type":"object"},"description":"Sort
    the list of clusters by a specific criteria"}],"responses":{"200":{"description":"List
    of clusters","content":{"application/json":{"schema":{"type":"object","properties":{"clusters":{"type":"array","items":{"$ref":"#/components/schemas/ClusterInfo"}},"next_page_token":{"type":"string","description":"Pagination
    token to retrieve the next page of results"},"prev_page_token":{"type":"string","description":"Pagination
    token to retrieve the previous page of results"}}}}}}}}},"/api/2.1/clusters/create":{"post":{"summary":"Create
    cluster","description":"Create a new cluster","operationId":"create_cluster","tags":["clusters"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateClusterRequest"}}}},"responses":{"200":{"description":"Cluster
    created successfully","content":{"application/json":{"schema":{"type":"object","properties":{"cluster_id":{"type":"string","description":"The
    canonical identifier for the newly created cluster"}}}}}}}}},"/api/2.1/clusters/get":{"get":{"summary":"Get
    cluster","description":"Get information about a specific cluster","operationId":"get_cluster","tags":["clusters"],"parameters":[{"name":"cluster_id","in":"query","required":true,"schema":{"type":"string"},"description":"The
    ID of the cluster"}],"responses":{"200":{"description":"Cluster information","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ClusterInfo"}}}}}}},"/api/2.1/clusters/start":{"post":{"summary":"Start
    cluster","description":"Start a cluster","operationId":"start_cluster","tags":["clusters"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"cluster_id":{"type":"string","description":"The
    ID of the cluster to start"}}}}}},"responses":{"200":{"description":"Cluster started
    successfully"}}}},"/api/2.1/clusters/restart":{"post":{"summary":"Restart cluster","description":"Restart
    a cluster","operationId":"restart_cluster","tags":["clusters"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"cluster_id":{"type":"string","description":"The
    ID of the cluster to restart"}}}}}},"responses":{"200":{"description":"Cluster
    restarted successfully"}}}},"/api/2.1/clusters/delete":{"post":{"summary":"Delete
    cluster","description":"Delete a cluster","operationId":"delete_cluster","tags":["clusters"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"cluster_id":{"type":"string","description":"The
    ID of the cluster to delete"}}}}}},"responses":{"200":{"description":"Cluster
    deleted successfully"}}}},"/api/2.1/clusters/edit":{"post":{"summary":"Update
    cluster configuration","description":"Edit the configuration of a cluster to match
    the provided attributes and size","operationId":"edit_cluster","tags":["clusters"],"requestBody":{"required":true,"content":{"application/json":{"schema":{"allOf":[{"$ref":"#/components/schemas/CreateClusterRequest"},{"type":"object","required":["cluster_id"],"properties":{"cluster_id":{"type":"string","description":"The
    ID of the cluster to edit"}}}]}}}},"responses":{"200":{"description":"Cluster
    configuration updated successfully"}}}},"/api/2.1/clusters/events":{"post":{"summary":"List
    cluster activity events","description":"Retrieve a list of events about the activity
