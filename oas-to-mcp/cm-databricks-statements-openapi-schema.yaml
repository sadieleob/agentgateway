    ID of the cluster to retrieve events for"},"start_time":{"type":"integer","description":"The
    start time in epoch milliseconds"},"end_time":{"type":"integer","description":"The
    end time in epoch milliseconds"},"order":{"type":"string","enum":["ASC","DESC"],"description":"The
    order to list events"},"event_types":{"type":"array","items":{"type":"string"},"description":"An
    optional set of event types to filter on"},"offset":{"type":"integer","description":"The
    offset in the result set"},"limit":{"type":"integer","description":"The maximum
    number of events to include"}}}}}},"responses":{"200":{"description":"List of
    cluster events","content":{"application/json":{"schema":{"type":"object","properties":{"events":{"type":"array","items":{"type":"object"}},"next_page":{"type":"object","description":"Pagination
    information for the next page"},"total_count":{"type":"integer","description":"The
    total number of events"}}}}}}}}},"/api/2.1/clusters/spark-versions":{"get":{"summary":"List
    available Spark versions","description":"Return the list of available Spark versions","operationId":"list_spark_versions","tags":["clusters"],"responses":{"200":{"description":"List
    of Spark versions","content":{"application/json":{"schema":{"type":"object","properties":{"versions":{"type":"array","items":{"type":"object","properties":{"key":{"type":"string","description":"Spark
    version key"},"name":{"type":"string","description":"Spark version name"}}}}}}}}}}}},"/api/2.1/clusters/list-node-types":{"get":{"summary":"List
    node types","description":"Return a list of supported Spark node types","operationId":"list_node_types","tags":["clusters"],"responses":{"200":{"description":"List
