apiVersion: v1
data:
  schema: |
    {"openapi":"3.0.3","info":{"title":"GitLab","description":"GitLab is a comprehensive DevOps platform that provides end-to-end software development lifecycle management.\nIt combines version control, continuous integration/continuous deployment (CI/CD), project management,\nand collaboration tools in a single application.\n\nKey Features:\n- Git repository hosting and version control\n- Issue tracking and project management\n- Continuous integration and deployment pipelines\n- Code review and merge request workflows\n- Wiki and documentation management\n- Container registry and package management\n- Security scanning and compliance monitoring\n","version":"4.0","contact":{"name":"GitLab API Documentation","url":"https://docs.gitlab.com/api/rest/"},"license":{"name":"MIT","url":"https://opensource.org/licenses/MIT"}},"servers":[{"url":"/api/v4","description":"Production GitLab instance"}],"paths":{"/projects":{"get":{"tags":["Projects"],"summary":"List all projects","description":"Retrieve a list of all visible projects across GitLab for the authenticated user.\nWhen accessed without authentication, only public projects with limited fields are returned.\nUse this endpoint to discover projects, filter by various criteria, and paginate through results.\n","operationId":"listProjects","parameters":[{"name":"archived","in":"query","description":"Limit by archived status","schema":{"type":"boolean"}},{"name":"membership","in":"query","description":"Limit by projects that the current user is a member of","schema":{"type":"boolean"}},{"name":"owned","in":"query","description":"Limit by projects explicitly owned by the current user","schema":{"type":"boolean"}},{"name":"starred","in":"query","description":"Limit by projects starred by the current user","schema":{"type":"boolean"}},{"name":"search","in":"query","description":"Return projects matching search criteria (case-insensitive substring match)","schema":{"type":"string"}},{"name":"simple","in":"query","description":"Return only limited fields for each project","schema":{"type":"boolean"}},{"name":"visibility","in":"query","description":"Limit by visibility level","schema":{"type":"string","enum":["public","internal","private"]}},{"name":"order_by","in":"query","description":"Return projects ordered by specified field","schema":{"type":"string","enum":["id","name","path","created_at","updated_at","star_count","last_activity_at"],"default":"created_at"}},{"name":"sort","in":"query","description":"Sort order","schema":{"type":"string","enum":["asc","desc"],"default":"desc"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}},{"name":"with_issues_enabled","in":"query","description":"Limit by enabled issues feature","schema":{"type":"boolean"}},{"name":"with_merge_requests_enabled","in":"query","description":"Limit by enabled merge requests feature","schema":{"type":"boolean"}},{"name":"statistics","in":"query","description":"Include project statistics (requires Reporter role or higher)","schema":{"type":"boolean"}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/Project"}}}}},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/projects/{id}":{"get":{"tags":["Projects"],"summary":"Get a single project","description":"Retrieve detailed information about a specific project. This endpoint can be accessed \nwithout authentication if the project is publicly accessible. Use project ID or \nURL-encoded path to identify the project.\n","operationId":"getProject","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]},"examples":{"numeric_id":{"value":42,"summary":"Project ID"},"path":{"value":"diaspora%2Fdiaspora-client","summary":"URL-encoded path"}}},{"name":"license","in":"query","description":"Include project license data","schema":{"type":"boolean"}},{"name":"statistics","in":"query","description":"Include project statistics (requires Reporter role or higher)","schema":{"type":"boolean"}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ProjectDetailed"}}}},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/issues":{"get":{"tags":["Issues"],"summary":"List all issues","description":"Get a list of all issues the authenticated user has access to across all projects.\nUse various filters to narrow down results by state, labels, assignee, and more.\n","operationId":"listAllIssues","parameters":[{"name":"state","in":"query","description":"Return issues with specified state","schema":{"type":"string","enum":["opened","closed","all"],"default":"all"}},{"name":"labels","in":"query","description":"Comma-separated list of label names","schema":{"type":"string"}},{"name":"milestone","in":"query","description":"Milestone title","schema":{"type":"string"}},{"name":"assignee_id","in":"query","description":"Return issues assigned to the given user id","schema":{"type":"integer"}},{"name":"author_id","in":"query","description":"Return issues created by the given user id","schema":{"type":"integer"}},{"name":"search","in":"query","description":"Search issues against their title and description","schema":{"type":"string"}},{"name":"created_after","in":"query","description":"Return issues created on or after the given time","schema":{"type":"string","format":"date-time"}},{"name":"created_before","in":"query","description":"Return issues created on or before the given time","schema":{"type":"string","format":"date-time"}},{"name":"updated_after","in":"query","description":"Return issues updated on or after the given time","schema":{"type":"string","format":"date-time"}},{"name":"updated_before","in":"query","description":"Return issues updated on or before the given time","schema":{"type":"string","format":"date-time"}},{"name":"order_by","in":"query","description":"Return issues ordered by specified field","schema":{"type":"string","enum":["created_at","updated_at","priority","due_date","relative_position","label_priority","milestone_due","popularity","weight"],"default":"created_at"}},{"name":"sort","in":"query","description":"Sort order","schema":{"type":"string","enum":["asc","desc"],"default":"desc"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/Issue"}}}}},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/projects/{id}/issues":{"get":{"tags":["Issues"],"summary":"List project issues","description":"Get a list of issues for a specific project. This endpoint provides detailed filtering \noptions and is the primary way to retrieve issues for automated processing.\n","operationId":"listProjectIssues","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"state","in":"query","description":"Return issues with specified state","schema":{"type":"string","enum":["opened","closed","all"],"default":"all"}},{"name":"labels","in":"query","description":"Comma-separated list of label names","schema":{"type":"string"}},{"name":"milestone","in":"query","description":"Milestone title","schema":{"type":"string"}},{"name":"assignee_id","in":"query","description":"Return issues assigned to the given user id","schema":{"type":"integer"}},{"name":"author_id","in":"query","description":"Return issues created by the given user id","schema":{"type":"integer"}},{"name":"search","in":"query","description":"Search issues against their title and description","schema":{"type":"string"}},{"name":"order_by","in":"query","description":"Return issues ordered by specified field","schema":{"type":"string","enum":["created_at","updated_at","priority","due_date","relative_position","label_priority","milestone_due","popularity","weight"],"default":"created_at"}},{"name":"sort","in":"query","description":"Sort order","schema":{"type":"string","enum":["asc","desc"],"default":"desc"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/Issue"}}}}},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}},"post":{"tags":["Issues"],"summary":"Create a new issue","description":"Create a new issue in the specified project. This endpoint allows agents to \ncreate issues for bug reports, feature requests, or other trackable items.\n","operationId":"createIssue","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["title"],"properties":{"title":{"type":"string","description":"Issue title","maxLength":255},"description":{"type":"string","description":"Issue description"},"labels":{"type":"string","description":"Comma-separated label names for the issue"},"assignee_id":{"type":"integer","description":"ID of the user to assign the issue to"},"milestone_id":{"type":"integer","description":"ID of a milestone to assign the issue to"},"due_date":{"type":"string","format":"date","description":"Due date for the issue"},"confidential":{"type":"boolean","description":"Set an issue to be confidential","default":false},"weight":{"type":"integer","description":"Weight of the issue (Premium feature)","minimum":0}}},"example":{"title":"Bug in user authentication","description":"Users are unable to log in with LDAP credentials","labels":"bug,authentication,priority::high","assignee_id":42,"due_date":"2024-12-31"}}}},"responses":{"201":{"description":"Issue created successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Issue"}}}},"400":{"$ref":"#/components/responses/BadRequest"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/projects/{id}/issues/{issue_iid}":{"get":{"tags":["Issues"],"summary":"Get a single project issue","description":"Retrieve detailed information about a specific issue using its internal ID (iid).\nThe iid is the issue number displayed in the GitLab UI.\n","operationId":"getProjectIssue","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"issue_iid","in":"path","required":true,"description":"The internal ID of the issue","schema":{"type":"integer"}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Issue"}}}},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}},"put":{"tags":["Issues"],"summary":"Edit an issue","description":"Update an existing issue. Only users with appropriate permissions can modify issues.\nThis endpoint allows agents to update issue details, change state, and modify attributes.\n","operationId":"updateIssue","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"issue_iid","in":"path","required":true,"description":"The internal ID of the issue","schema":{"type":"integer"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"title":{"type":"string","description":"Issue title","maxLength":255},"description":{"type":"string","description":"Issue description"},"labels":{"type":"string","description":"Comma-separated label names for the issue"},"assignee_id":{"type":"integer","description":"ID of the user to assign the issue to"},"state_event":{"type":"string","enum":["close","reopen"],"description":"Change the state of the issue"},"milestone_id":{"type":"integer","description":"ID of a milestone to assign the issue to"},"due_date":{"type":"string","format":"date","description":"Due date for the issue"},"confidential":{"type":"boolean","description":"Set an issue to be confidential"},"weight":{"type":"integer","description":"Weight of the issue (Premium feature)","minimum":0}}},"example":{"title":"Updated: Bug in user authentication","state_event":"close","labels":"bug,authentication,resolved"}}}},"responses":{"200":{"description":"Issue updated successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Issue"}}}},"400":{"$ref":"#/components/responses/BadRequest"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"},"403":{"$ref":"#/components/responses/Forbidden"}}}},"/projects/{id}/merge_requests/{merge_request_iid}/unapprove":{"post":{"tags":["Merge Requests"],"summary":"Unapprove a merge request","description":"Remove an approval from a merge request. Available in GitLab Premium and above.\n","operationId":"unapproveMergeRequest","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"merge_request_iid","in":"path","required":true,"description":"The internal ID of the merge request","schema":{"type":"integer"}}],"responses":{"201":{"description":"Approval removed successfully"},"401":{"$ref":"#/components/responses/Unauthorized"},"404":{"$ref":"#/components/responses/NotFound"}}}},"/projects/{id}/merge_requests/{merge_request_iid}/changes":{"get":{"tags":["Merge Requests"],"summary":"Get merge request changes","description":"Shows information about the merge request including its files and changes.\nUse this endpoint to review the actual code changes in a merge request.\n","operationId":"getMergeRequestChanges","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"merge_request_iid","in":"path","required":true,"description":"The internal ID of the merge request","schema":{"type":"integer"}},{"name":"access_raw_diffs","in":"query","description":"Retrieve raw diffs without size limits","schema":{"type":"boolean","default":false}}],"responses":{"200":{"description":"Successful response"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/users":{"get":{"tags":["Users"],"summary":"List users","description":"Get a list of users. This endpoint can be accessed without authentication \nand returns basic user information. Use for user discovery and lookup.\n","operationId":"listUsers","parameters":[{"name":"username","in":"query","description":"Get user by username","schema":{"type":"string"}},{"name":"search","in":"query","description":"Search for users by name, username, or email","schema":{"type":"string"}},{"name":"active","in":"query","description":"Return only active users","schema":{"type":"boolean"}},{"name":"order_by","in":"query","description":"Return users ordered by specified field","schema":{"type":"string","enum":["id","name","username","created_at","updated_at"],"default":"id"}},{"name":"sort","in":"query","description":"Sort order","schema":{"type":"string","enum":["asc","desc"],"default":"asc"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/User"}}}}}}}},"/users/{id}":{"get":{"tags":["Users"],"summary":"Get a single user","description":"Retrieve information about a specific user. This endpoint can be accessed \nwithout authentication and returns basic user profile information.\n","operationId":"getUser","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or username of the user","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}}],"responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"$ref":"#/components/schemas/User"}}}},"404":{"$ref":"#/components/responses/NotFound"}}}},"/user":{"get":{"tags":["Users"],"summary":"Get current user","description":"Retrieve information about the currently authenticated user. Use this endpoint \nto get details about the user making API requests.\n","operationId":"getCurrentUser","responses":{"200":{"description":"Successful response","content":{"application/json":{"schema":{"$ref":"#/components/schemas/UserDetailed"}}}},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/merge_requests":{"get":{"tags":["Merge Requests"],"summary":"List all merge requests","description":"Get a list of all merge requests the authenticated user has access to across all projects.\nUse various filters to narrow down results by state, labels, assignee, and more.\n","operationId":"listAllMergeRequests","parameters":[{"name":"state","in":"query","description":"Return merge requests with specified state","schema":{"type":"string","enum":["opened","closed","locked","merged","all"],"default":"all"}},{"name":"scope","in":"query","description":"Return merge requests for the given scope","schema":{"type":"string","enum":["created_by_me","assigned_to_me","all"],"default":"created_by_me"}},{"name":"author_id","in":"query","description":"Return merge requests created by the given user id","schema":{"type":"integer"}},{"name":"assignee_id","in":"query","description":"Return merge requests assigned to the given user id","schema":{"type":"integer"}},{"name":"reviewer_id","in":"query","description":"Return merge requests with the given user id as reviewer","schema":{"type":"integer"}},{"name":"labels","in":"query","description":"Comma-separated list of label names","schema":{"type":"string"}},{"name":"milestone","in":"query","description":"Milestone title","schema":{"type":"string"}},{"name":"source_branch","in":"query","description":"Return merge requests with the given source branch","schema":{"type":"string"}},{"name":"target_branch","in":"query","description":"Return merge requests with the given target branch","schema":{"type":"string"}},{"name":"search","in":"query","description":"Search merge requests against their title and description","schema":{"type":"string"}},{"name":"wip","in":"query","description":"Filter merge requests against their wip status","schema":{"type":"string","enum":["yes","no"]}},{"name":"created_after","in":"query","description":"Return merge requests created on or after the given time","schema":{"type":"string","format":"date-time"}},{"name":"created_before","in":"query","description":"Return merge requests created on or before the given time","schema":{"type":"string","format":"date-time"}},{"name":"updated_after","in":"query","description":"Return merge requests updated on or after the given time","schema":{"type":"string","format":"date-time"}},{"name":"updated_before","in":"query","description":"Return merge requests updated on or before the given time","schema":{"type":"string","format":"date-time"}},{"name":"order_by","in":"query","description":"Return merge requests ordered by specified field","schema":{"type":"string","enum":["created_at","updated_at","priority","label_priority","milestone_due","popularity","title"],"default":"created_at"}},{"name":"sort","in":"query","description":"Sort order","schema":{"type":"string","enum":["asc","desc"],"default":"desc"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}}],"responses":{"200":{"description":"Successful response"},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/projects/{id}/merge_requests":{"get":{"tags":["Merge Requests"],"summary":"List project merge requests","description":"Get a list of merge requests for a specific project. This endpoint provides detailed filtering \noptions and is the primary way to retrieve merge requests for automated processing.\n","operationId":"listProjectMergeRequests","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"state","in":"query","description":"Return merge requests with specified state","schema":{"type":"string","enum":["opened","closed","locked","merged","all"],"default":"all"}},{"name":"scope","in":"query","description":"Return merge requests for the given scope","schema":{"type":"string","enum":["created_by_me","assigned_to_me","all"]}},{"name":"author_id","in":"query","description":"Return merge requests created by the given user id","schema":{"type":"integer"}},{"name":"assignee_id","in":"query","description":"Return merge requests assigned to the given user id","schema":{"type":"integer"}},{"name":"reviewer_id","in":"query","description":"Return merge requests with the given user id as reviewer","schema":{"type":"integer"}},{"name":"labels","in":"query","description":"Comma-separated list of label names","schema":{"type":"string"}},{"name":"milestone","in":"query","description":"Milestone title","schema":{"type":"string"}},{"name":"source_branch","in":"query","description":"Return merge requests with the given source branch","schema":{"type":"string"}},{"name":"target_branch","in":"query","description":"Return merge requests with the given target branch","schema":{"type":"string"}},{"name":"search","in":"query","description":"Search merge requests against their title and description","schema":{"type":"string"}},{"name":"wip","in":"query","description":"Filter merge requests against their wip status","schema":{"type":"string","enum":["yes","no"]}},{"name":"order_by","in":"query","description":"Return merge requests ordered by specified field","schema":{"type":"string","enum":["created_at","updated_at","priority","label_priority","milestone_due","popularity","title"],"default":"created_at"}},{"name":"sort","in":"query","description":"Sort order","schema":{"type":"string","enum":["asc","desc"],"default":"desc"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}}],"responses":{"200":{"description":"Successful response"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}},"post":{"tags":["Merge Requests"],"summary":"Create a merge request","description":"Create a new merge request in the specified project. This endpoint allows agents to \ncreate merge requests for code changes, feature additions, or bug fixes.\n","operationId":"createMergeRequest","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["source_branch","target_branch","title"],"properties":{"source_branch":{"type":"string","description":"Source branch name","example":"feature-branch"},"target_branch":{"type":"string","description":"Target branch name","example":"main"},"title":{"type":"string","description":"Merge request title","maxLength":255,"example":"Add user authentication feature"},"description":{"type":"string","description":"Merge request description","example":"This MR adds JWT-based authentication to the API"},"assignee_id":{"type":"integer","description":"ID of the user to assign the merge request to"},"assignee_ids":{"type":"array","items":{"type":"integer"},"description":"Array of user IDs to assign the merge request to"},"reviewer_ids":{"type":"array","items":{"type":"integer"},"description":"Array of user IDs to set as reviewers"},"labels":{"type":"string","description":"Comma-separated label names for the merge request","example":"feature,backend,needs-review"},"milestone_id":{"type":"integer","description":"ID of a milestone to assign the merge request to"},"remove_source_branch":{"type":"boolean","description":"Flag indicating if source branch should be removed after merge","default":false},"allow_collaboration":{"type":"boolean","description":"Allow commits from members who can merge to the target branch","default":false},"squash":{"type":"boolean","description":"Squash commits when merge request is accepted","default":false}}}}}},"responses":{"201":{"description":"Merge request created successfully"},"400":{"$ref":"#/components/responses/BadRequest"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"},"403":{"$ref":"#/components/responses/Forbidden"}}}},"/projects/{id}/merge_requests/{merge_request_iid}":{"get":{"tags":["Merge Requests"],"summary":"Get a single merge request","description":"Retrieve detailed information about a specific merge request using its internal ID (iid).\nThe iid is the merge request number displayed in the GitLab UI.\n","operationId":"getProjectMergeRequest","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"merge_request_iid","in":"path","required":true,"description":"The internal ID of the merge request","schema":{"type":"integer"}},{"name":"render_html","in":"query","description":"If true, response includes rendered HTML for title and description","schema":{"type":"boolean","default":false}},{"name":"include_diverged_commits_count","in":"query","description":"If true, response includes the commits behind the target branch","schema":{"type":"boolean","default":false}},{"name":"include_rebase_in_progress","in":"query","description":"If true, response includes whether a rebase is in progress","schema":{"type":"boolean","default":false}}],"responses":{"200":{"description":"Successful response"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}},"put":{"tags":["Merge Requests"],"summary":"Update a merge request","description":"Update an existing merge request. Only users with appropriate permissions can modify merge requests.\nThis endpoint allows agents to update merge request details, change state, and modify attributes.\n","operationId":"updateMergeRequest","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"merge_request_iid","in":"path","required":true,"description":"The internal ID of the merge request","schema":{"type":"integer"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","properties":{"title":{"type":"string","description":"Merge request title","maxLength":255},"description":{"type":"string","description":"Merge request description"},"target_branch":{"type":"string","description":"Target branch name"},"assignee_id":{"type":"integer","description":"ID of the user to assign the merge request to"},"assignee_ids":{"type":"array","items":{"type":"integer"},"description":"Array of user IDs to assign the merge request to"},"reviewer_ids":{"type":"array","items":{"type":"integer"},"description":"Array of user IDs to set as reviewers"},"labels":{"type":"string","description":"Comma-separated label names for the merge request"},"milestone_id":{"type":"integer","description":"ID of a milestone to assign the merge request to"},"state_event":{"type":"string","enum":["close","reopen"],"description":"Change the state of the merge request"},"remove_source_branch":{"type":"boolean","description":"Flag indicating if source branch should be removed after merge"},"squash":{"type":"boolean","description":"Squash commits when merge request is accepted"},"discussion_locked":{"type":"boolean","description":"Lock/unlock discussion"}}},"example":{"title":"Updated: Add user authentication feature","state_event":"close","labels":"feature,backend,completed"}}}},"responses":{"200":{"description":"Merge request updated successfully"},"400":{"$ref":"#/components/responses/BadRequest"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"},"403":{"$ref":"#/components/responses/Forbidden"}}}},"/projects/{id}/merge_requests/{merge_request_iid}/commits":{"get":{"tags":["Merge Requests"],"summary":"List merge request commits","description":"Get a list of commits for a specific merge request. This endpoint helps agents\nunderstand what changes are included in the merge request.\n","operationId":"listMergeRequestCommits","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"merge_request_iid","in":"path","required":true,"description":"The internal ID of the merge request","schema":{"type":"integer"}},{"name":"page","in":"query","description":"Page number for pagination","schema":{"type":"integer","minimum":1,"default":1}},{"name":"per_page","in":"query","description":"Number of items per page","schema":{"type":"integer","minimum":1,"maximum":100,"default":20}}],"responses":{"200":{"description":"Successful response"},"404":{"$ref":"#/components/responses/NotFound"},"401":{"$ref":"#/components/responses/Unauthorized"}}}},"/projects/{id}/merge_requests/{merge_request_iid}/approve":{"post":{"tags":["Merge Requests"],"summary":"Approve a merge request","description":"Approve a merge request. This is a safe operation that indicates code review approval\nwithout actually merging the changes. Available in GitLab Premium and above.\n","operationId":"approveMergeRequest","parameters":[{"name":"id","in":"path","required":true,"description":"The ID or URL-encoded path of the project","schema":{"oneOf":[{"type":"integer"},{"type":"string"}]}},{"name":"merge_request_iid","in":"path","required":true,"description":"The internal ID of the merge request","schema":{"type":"integer"}}],"requestBody":{"content":{"application/json":{"schema":{"type":"object","properties":{"sha":{"type":"string","description":"The HEAD of the merge request (optional, for ensuring approval is for latest version)","example":"a91957a858320c0e17f3a0eca7cfacbff50ea29a"}}}}}},"responses":{"201":{"description":"Approval added successfully'"},"401":{"$ref":"#/components/responses/Unauthorized"},"404":{"$ref":"#/components/responses/NotFound"},"409":{"description":"Already approved by the user","content":{"application/json":{"schema":{"type":"object","properties":{"message":{"type":"string","example":"409 Already