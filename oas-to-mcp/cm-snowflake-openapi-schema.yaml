data:
  schema: '{"openapi":"3.0.0","servers":[{"description":"Snowflake SQL","url":""}],"info":{"version":"2.0.0","title":"Snowflake SQL","description":"Snowflake is a comprehensive cloud data platform for storing, processing, and analyzing large volumes of data with enterprise-grade security. It provides elastic scaling, multi-cloud deployment (AWS, Azure, GCP), data sharing, real-time analytics, end-to-end encryption, and ANSI SQL compliance with popular BI tool integrations.\n","contact":{"name":"Snowflake, Inc.","url":"https://snowflake.com","email":"support@snowflake.com"}},"paths":{"/api/v2/databases":{"parameters":[{"$ref":"#/components/parameters/requestId"},{"$ref":"#/components/parameters/accept"},{"$ref":"#/components/parameters/userAgent"},{"$ref":"#/components/parameters/snowflakeAuthorizationTokenType"}],"get":{"operationId":"ListDatabases","summary":"List databases","description":"Lists databases available in the Snowflake account.","tags":["databases"],"security":[{"keyPair":[]},{"ExternalOAuth":[]},{"snowflakeOAuth":[]}],"parameters":[{"name":"like","in":"query","schema":{"type":"string"},"description":"Filter
    databases by name pattern (case-insensitive)","example":"TEST%"},{"name":"startsWith","in":"query","schema":{"type":"string"},"description":"Filter databases that start with specified string (case-sensitive)","example":"PROD"},{"name":"showLimit","in":"query","schema":{"type":"integer","minimum":1},"description":"Limit the number of databases returned","example":100},{"name":"fromName","in":"query","schema":{"type":"string"},"description":"Fetch databases starting after the specified name","example":"DATABASE_A"},{"name":"history","in":"query","schema":{"type":"boolean"},"description":"Include dropped databases in the results","example":false}],"responses":{"200":{"description":"Successfully retrieved list of databases","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DatabaseList"}}}},"400":{"$ref":"#/components/responses/400BadRequest"},"401":{"$ref":"#/components/responses/401Unauthorized"},"403":{"$ref":"#/components/responses/403Forbidden"},"500":{"$ref":"#/components/responses/500InternalServerError"}}},"post":{"operationId":"CreateDatabase","summary":"Create
