    - Insufficient permissions"}}}},"/now/table/sysapproval_approver":{"get":{"summary":"Get
    pending approvals","description":"Retrieves approval records from the sysapproval_approver
    table. Use this endpoint to query for pending approvals,\nfilter by approver,
    source table, date ranges, and other criteria.\n\n**Common Use Cases:**\n- Get
    all pending approvals for current user: `state=requested^approver=javascript:gs.getUserID()`\n-
    Get all pending approvals for a specific approver: `state=requested^approver=<user_sys_id>`\n-
    Get approvals for specific source tables: `source_tableINsc_req_item,change_request^state=requested`\n-
    Get approvals within a date range: `sys_updated_onBETWEEN<start_date>@<end_date>^state=requested`\n-
    Get active approvals: `active=true^state=requested^sysapprovalISNOTEMPTY`\n\n**Query
    Operators:**\n- `=` equals, `!=` not equals\n- `IN` value in list (comma-separated):
    `fieldINvalue1,value2,value3`\n- `BETWEEN` date range: `fieldBETWEENstart_date@end_date`
    (use @ as separator, dates in format: YYYY-MM-DD HH:MM:SS or YYYY-MM-DD)\n- `>=`
    greater than or equal, `<=` less than or equal (for dates: `sys_created_on>=2024-01-01`)\n-
    `ISEMPTY` field is empty, `ISNOTEMPTY` field is not empty\n- `LIKE` contains (use
    * as wildcard): `fieldLIKE*text*`\n- Combine conditions with `^` (AND): `field1=value1^field2=value2`\n\n**JavaScript
    Expressions:**\nServiceNow REST API supports JavaScript expressions in queries.
    Common examples:\n- `javascript:gs.getUserID()` - Get current user''s sys_id\n-
    `javascript:gs.daysAgoStart(30)` - Get date 30 days ago\n- `javascript:gs.daysAgoEnd(7)`
    - Get date 7 days ago (end of day)\nThese expressions are evaluated server-side
    by ServiceNow.\n\n**Important Fields for Filtering:**\n- `state`: Approval state
    (requested, approved, rejected, cancelled)\n- `approver`: Sys_id of the approver
    user\n- `source_table`: Table name of the source record (e.g., sc_req_item, change_request)\n-
    `document_id`: Sys_id of the document requiring approval\n- `sysapproval`: Reference
    to the sysapproval record\n- `active`: Whether the approval record is active (true/false)\n-
    `sys_created_on`, `sys_updated_on`: Timestamps for date range queries\n","operationId":"getPendingApprovals","tags":["Approval
    Management"],"parameters":[{"name":"sysparm_query","in":"query","schema":{"type":"string"},"description":"Encoded
    query string to filter results. Use ServiceNow query syntax with operators like
    =, IN, BETWEEN, ISNOTEMPTY.\nCombine multiple conditions with ^ (AND operator).\n\nExamples:\n-
    Current user pending approvals: `state=requested^approver=javascript:gs.getUserID()`\n-
    Simple: `state=requested^approver=<user_sys_id>`\n- Multiple tables: `source_tableINsc_req_item,change_request^state=requested^active=true`\n-
    Date range: `sys_updated_onBETWEEN2024-01-01 00:00:00@2024-01-31 23:59:59^state=requested`\n-
    Complex (matches Moveworks pattern): `source_tableINsc_req_item,change_request^state=requested^active=true^sysapprovalISNOTEMPTY^sys_updated_onBETWEEN2024-01-01@2024-01-31`\n-
    Recent approvals: `sys_created_on>=2024-01-01^state=requested` (for approvals
    created after a date)\n- With JavaScript date: `sys_created_on>=javascript:gs.daysAgoStart(30)^state=requested`\n\n**Note:**
    \n- Use `javascript:gs.getUserID()` to get current user''s sys_id dynamically\n-
    Replace `<user_sys_id>` with actual sys_id for specific users\n- For date ranges,
    use format YYYY-MM-DD or YYYY-MM-DD HH:MM:SS, or JavaScript expressions like `javascript:gs.daysAgoStart(30)`\n","example":"state=requested^approver=javascript:gs.getUserID()"},{"name":"sysparm_limit","in":"query","schema":{"type":"integer","default":10},"description":"Maximum
    number of records to return"},{"name":"sysparm_offset","in":"query","schema":{"type":"integer","default":0},"description":"Number
    of records to skip"},{"name":"sysparm_fields","in":"query","schema":{"type":"string"},"description":"**Optional:**
    Comma-separated list of fields to return. \n\n**Important:** If not specified,
    ServiceNow returns ALL fields by default. Only include this parameter if you want
    to limit the response to specific fields.\n\nCommon fields: sys_id, sysapproval,
    document_id, state, approver, comments, source_table, source_id, due_date, requested_by,
    requested_date, sys_created_on, sys_updated_on, active, number\n"},{"name":"sysparm_display_value","in":"query","schema":{"type":"string","enum":["true","false","all"],"default":"all"},"description":"Return
    display values (true), actual values (false), or both (all). Defaults to ''all''
    to return both display values and actual values (sys_ids) for all fields."},{"name":"sysparm_exclude_reference_link","in":"query","schema":{"type":"boolean"},"description":"Exclude
    reference links from the response"},{"name":"sysparm_view","in":"query","schema":{"type":"string"},"description":"Specify
    a view to use for the query"},{"name":"sysparm_suppress_pagination_header","in":"query","schema":{"type":"boolean"},"description":"Suppress
    pagination header in the response"}],"responses":{"200":{"description":"Success
    - Returns array of approval records matching the query","content":{"application/json":{"schema":{"type":"object","additionalProperties":true,"description":"ServiceNow
    API response. The response structure is dynamic and may include:\n- `result`:
    Array of approval records (when querying multiple records)\n- Additional metadata
    fields\n- Instance-specific custom fields\n- Pagination information (if sysparm_suppress_pagination_header=false)\n\n**Note:**
    The actual response structure may vary based on:\n- Instance configuration\n-
    Custom fields and plugins\n- sysparm_display_value setting\n- sysparm_fields parameter\n\nThis
    schema allows all fields to pass through without restriction.\n"},"examples":{"pending_approvals_with_display_values":{"summary":"Pending
