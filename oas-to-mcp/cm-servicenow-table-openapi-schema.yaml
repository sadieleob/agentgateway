    required"},"403":{"description":"Forbidden - Insufficient permissions"}}},"put":{"summary":"Update
    approval (approve/reject)","description":"Updates an approval record to approve
    or reject an approval request. This is the primary endpoint for\nprocessing approvals
    programmatically.\n\n**Use Cases:**\n- Approve a pending approval: Set `state`
    to \"approved\" with optional `comments`\n- Reject a pending approval: Set `state`
    to \"rejected\" with optional `comments` explaining the rejection\n- Cancel an
    approval: Set `state` to \"cancelled\"\n\n**Request Format:**\n- Content-Type:
    `application/json` (preferred) or `application/x-www-form-urlencoded`\n- For JSON:
    Send `{\"state\": \"approved\", \"comments\": \"...\"}`\n- For form data: Send
    `state=approved&comments=...`\n\n**Important Notes:**\n- The `state` field must
    not be read-only at the dictionary level\n- Access Control Lists (ACLs) may restrict
    who can update approval records\n- Only the assigned approver (or users with appropriate
    permissions) can update the approval\n- State transitions are validated by ServiceNow
    business rules\n- Updating the state triggers workflow notifications and updates
    the parent record (e.g., change request)\n\n**Required Fields:**\n- `state`: Must
    be one of: \"requested\", \"approved\", \"rejected\", \"cancelled\"\n\n**Optional
    Fields:**\n- `comments`: Comments or reason for the approval decision (recommended
    for audit trail)\n","operationId":"updateApproval","tags":["Approval Management"],"parameters":[{"name":"sys_id","in":"path","required":true,"schema":{"type":"string"},"description":"The
    sys_id of the approval record to update (obtained from GET /now/table/sysapproval_approver)"}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["state"],"properties":{"state":{"type":"string","enum":["requested","approved","rejected","cancelled"],"description":"Approval
