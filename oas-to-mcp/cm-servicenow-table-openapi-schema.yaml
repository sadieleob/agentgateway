apiVersion: v1
data:
  schema: '{"openapi":"3.0.3","info":{"title":"ServiceNow IT Service Management (ITSM)","description":"ServiceNow
    IT Service Management (ITSM) is a comprehensive platform that streamlines IT service\ndelivery
    and operations through ITIL-aligned processes and workflows. It helps organizations\nimprove
    service quality, reduce costs, and enhance user satisfaction through intelligent\nautomation
    and self-service capabilities.\n\nKey Features:\n- Incident management with intelligent
    routing and prioritization\n- Problem management for root cause analysis and prevention\n-
    Change management with risk assessment and approval workflows\n- Service request
    fulfillment and catalog management\n- Knowledge management and self-service portals\n-
    Service level management (SLM) and performance tracking\n- Configuration management
    database (CMDB) for asset tracking\n- Service portfolio and catalog management\n-
    AI-powered virtual agents and chatbots for user support\n- Mobile-first experience
    for end users and IT staff\n- Integration with monitoring tools and third-party
    systems\n","version":"2024.1","contact":{"name":"ServiceNow ITSM Support","url":"https://www.servicenow.com/products/itsm.html"},"termsOfService":"https://www.servicenow.com/terms-of-use.html"},"servers":[{"url":"/api","description":"ServiceNow
    instance endpoint","variables":{"instance":{"default":"dev12345","description":"Your
    ServiceNow instance ID"}}}],"security":[{"oauth2":["itsm:read","itsm:write"]},{"basicAuth":[]}],"paths":{"/now/table/incident":{"get":{"summary":"List
