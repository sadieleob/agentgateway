apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: ${AGW_NAMESPACE}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway
      namespace: ${AGW_NAMESPACE}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: ${BACKEND_ROUTE_PREFIX}
        - path:
            type: PathPrefix
            value: "/.well-known/oauth-protected-resource${BACKEND_ROUTE_PREFIX}"
        - path:
            type: PathPrefix
            value: "/.well-known/oauth-authorization-server${BACKEND_ROUTE_PREFIX}"
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: ${BACKEND_NAME}
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth-issuer-route
  namespace: ${AGW_NAMESPACE}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway
      namespace: ${AGW_NAMESPACE}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth-issuer
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: issuer-proxy-backend
          weight: 1
