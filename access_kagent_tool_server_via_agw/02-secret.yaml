apiVersion: v1
kind: Secret
metadata:
  name: kagent-mcp-token-exchange
  namespace: agentgateway-system
type: Opaque
stringData:
  client_id: "<ENTRA_CLIENT_ID>"
  client_secret: "<ENTRA_CLIENT_SECRET>"
  authorize_url: "https://login.microsoftonline.com/<ENTRA_TENANT_ID>/oauth2/v2.0/authorize"
  access_token_url: "https://login.microsoftonline.com/<ENTRA_TENANT_ID>/oauth2/v2.0/token"
  scopes: "api://<ENTRA_CLIENT_ID>/agentgateway"
  app_id: "kagent-mcp"
  mcp_resource: "/kagent/mcp"
