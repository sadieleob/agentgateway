apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  annotations: {}
  name: extauth-model-override
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-routing-demo
  traffic:
    extAuth:
      backendRef:
        group: ""
        kind: Service
        name: mock-extauth
        namespace: agentgateway-system
        port: 9001
      forwardBody:
        maxSize: 8192
      grpc: {}
    phase: PreRouting
