apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  annotations: {}
  name: combined-atlassian-exchange
  namespace: agentgateway-system
spec:
  backend:
    tokenExchange:
      elicitation:
        secretName: combined-atlassian-token-exchange
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: combined-atlassian-backend
