# Anthropic LLM Backend
#
# NOTE: The per-provider RateLimitConfigs and EnterpriseAgentgatewayPolicy that
# were previously in this file have been removed. Rate limiting is now handled
# globally via 01-ratelimitconfig-request.yaml, 02-ratelimitconfig-token.yaml,
# and 03-unified-ratelimit-policy.yaml.
#
# Routing is handled by the unified llm-provider-route (header-based via
# PreRouting ExtAuth). This file only contains the backend + secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: agentgateway-system
type: Opaque
stringData:
  Authorization: "${ANTHROPIC_APIKEY}"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic-llm-backend
  namespace: agentgateway-system
spec:
  ai:
    groups:
    - providers:
      - name: anthropic-provider
        anthropic: {}
        policies:
          auth:
            secretRef:
              name: anthropic-api-key
