# Anthropic API Key Secret
# Create with: kubectl apply -f 04-anthropic-backend.yaml
# Requires: ANTHROPIC_APIKEY env var set (source ~/.zshrc)
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: agentgateway-system
type: Opaque
stringData:
  Authorization: "${ANTHROPIC_APIKEY}"
---
# Anthropic LLM Backend
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic-llm-backend
  namespace: agentgateway-system
spec:
  ai:
    groups:
    - providers:
      - name: anthropic-provider
        anthropic: {}
        policies:
          auth:
            secretRef:
              name: anthropic-api-key
---
# Anthropic HTTPRoute (/anthropic prefix)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic-llm-route
  namespace: agentgateway-system
spec:
  hostnames:
  - agentgateway.servebeer.com
  parentRefs:
  - name: agentgateway-llm-test
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /anthropic
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: anthropic-llm-backend
---
# Anthropic Request Rate Limit (3 req/min)
apiVersion: ratelimit.solo.io/v1alpha1
kind: RateLimitConfig
metadata:
  name: anthropic-request-rate-limit
  namespace: agentgateway-system
spec:
  raw:
    descriptors:
    - key: generic_key
      value: anthropic-request-counter
      rateLimit:
        requestsPerUnit: 3
        unit: MINUTE
    rateLimits:
    - actions:
      - genericKey:
          descriptorValue: anthropic-request-counter
      type: REQUEST
---
# Anthropic Token Rate Limit (100 tokens/min)
apiVersion: ratelimit.solo.io/v1alpha1
kind: RateLimitConfig
metadata:
  name: anthropic-token-rate-limit
  namespace: agentgateway-system
spec:
  raw:
    descriptors:
    - key: generic_key
      value: anthropic-token-counter
      rateLimit:
        requestsPerUnit: 100
        unit: MINUTE
    rateLimits:
    - actions:
      - genericKey:
          descriptorValue: anthropic-token-counter
      type: TOKEN
---
# Anthropic Rate Limit Policy
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: anthropic-rate-limit
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: anthropic-llm-route
  traffic:
    entRateLimit:
      global:
        rateLimitConfigRefs:
        - name: anthropic-request-rate-limit
        - name: anthropic-token-rate-limit
