# Unified Rate Limit Policy for llm-provider-route
#
# IMPORTANT: Only ONE AgentgatewayPolicy with rateLimit can target a given
# HTTPRoute. Multiple rateLimit policies on the same route conflict and
# silently disable enforcement. All descriptor sets MUST be in one policy.
#
# Uses AgentgatewayPolicy (not EnterpriseAgentgatewayPolicy entRateLimit)
# because entRateLimit with rateLimitConfigRefs does NOT enforce in
# agentgateway-enterprise 2.2.0-beta.5. The AgentgatewayPolicy rateLimit.global
# approach with explicit backendRef + descriptors works correctly.
#
# Architecture:
#   Client → Gateway (agentgateway-routing-demo)
#     → PreRouting ExtAuth (mock-extauth:9001) reads body, sets x-model-provider header
#     → Rate Limiting (this policy) — global request + per-agent counters
#     → llm-provider-route matches on x-model-provider header
#       → openai rule:    x-model-provider=openai    → openai-llm-backend
#       → anthropic rule: x-model-provider=anthropic  → anthropic-llm-backend
#
# Descriptor sets:
#   1. Global request counter (3 req/min for testing, raise in prod)
#   2. Per-agent request counter (50 req/min per agent, keyed by x-client-id)
#
# Per GitHub issue #1021 workaround: the generic_key entry with the
# namespace.name prefix is REQUIRED for the rate limiter to match
# the RateLimitConfig descriptor tree.
#
# CEL limitation (GitHub issue #850): CEL values must evaluate to a string.
# request.headers["x-client-id"] returns a string, so this works.
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: llm-rate-limit
  namespace: agentgateway-system
  labels:
    app: agentgateway
    purpose: rate-limiting
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: llm-provider-route
  traffic:
    rateLimit:
      global:
        backendRef:
          name: rate-limiter-enterprise-agentgateway-sadiel
          namespace: agentgateway-system
          port: 8083
        domain: solo.io
        descriptors:
        # Global request rate limit (matches 01-ratelimitconfig-request.yaml)
        - entries:
          - name: "generic_key"
            expression: '"agentgateway-system.llm-request-rate-limit"'
          - name: "generic_key"
            expression: '"llm-request-counter"'
        # Per-agent request rate limit (matches 05-per-agent-ratelimitconfig.yaml)
        # IMPORTANT: x-client-id header MUST be present for this descriptor to
        # evaluate. If missing, the ENTIRE rate limit check fails open (all
        # descriptor sets skipped, including global). The PreRouting ExtAuth
        # server must always set x-client-id — use "unknown" as default when
        # no agent identity is available.
        - entries:
          - name: "generic_key"
            expression: '"agentgateway-system.per-agent-request-rate-limit"'
          - name: "x-client-id"
            expression: 'request.headers["x-client-id"]'
