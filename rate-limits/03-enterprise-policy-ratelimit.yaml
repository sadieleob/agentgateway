apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: openai-rate-limit
  namespace: agentgateway-system
  labels:
    app: agentgateway
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: openai-llm-route
  traffic:
    entRateLimit:
      global:
        rateLimitConfigRefs:
        - name: openai-request-rate-limit
        - name: openai-token-rate-limit
