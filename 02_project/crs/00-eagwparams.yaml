apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayParameters
metadata:
  annotations: {}
  name: agentgateway-params
  namespace: agentgateway-system
spec:
  env:
    - name: STS_URI
      value: http://enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777/elicitations/oauth2/token
    - name: STS_AUTH_TOKEN
      value: ./var/run/secrets/xds-tokens/xds-token
  image:
    registry: us-docker.pkg.dev/solo-public/enterprise-agentgateway
    repository: agentgateway-enterprise
    tag: 2.3.0-beta.6
  logging:
    level: info
  rawConfig:
    config:
      logging:
        fields:
          add:
            jwt: jwt
            model: llm.requestModel
            prompt: llm.prompt
            provider: llm.provider
            request.body: json(request.body)
            response.body: json(response.body)
            roles: jwt.realm_access.roles
            rq.headers: flatten(request.headers)
            rq.headers.all: request.headers
            x-foo: request.headers["x-foo"]
        format: json
      tracing:
        fields:
          add:
            gen_ai.completion: 'llm.completion.map(c, {"role":"assistant", "content": c})'
            gen_ai.operation.name: '"chat"'
            gen_ai.prompt: llm.prompt
            gen_ai.request: flatten(llm.params)
            gen_ai.request.model: llm.requestModel
            gen_ai.response.model: llm.responseModel
            gen_ai.system: llm.provider
            gen_ai.usage.input_tokens: llm.inputTokens
            gen_ai.usage.output_tokens: llm.outputTokens
            jwt: jwt
            response.body: json(response.body)
            rq.headers.all: request.headers
        otlpEndpoint: http://solo-enterprise-telemetry-collector.kagent.svc.cluster.local:4317
        otlpProtocol: grpc
        randomSampling: "true"
  service:
    metadata:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        service.beta.kubernetes.io/aws-load-balancer-ssl-cert: REDACTED
        service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
        service.beta.kubernetes.io/aws-load-balancer-type: external
    spec:
      type: LoadBalancer
  sharedExtensions:
    extCache:
      enabled: true
    extauth:
      enabled: true
    ratelimiter:
      enabled: true
