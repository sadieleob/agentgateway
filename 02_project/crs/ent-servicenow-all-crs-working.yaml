apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata:
  name: ent-servicenow-openapi-backend
  namespace: agentgateway-system
spec:
  entMcp:
    targets:
    - name: ent-servicenow-table-openapi
      static:
        host: dev364551.service-now.com
        port: 443
        protocol: OpenAPI
        openAPI:
          schemaRef:
            name: servicenow-table-openapi-schema
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: servicenow-table-openapi-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway
  rules:
  - backendRefs:
    - group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend
      name: ent-servicenow-openapi-backend
    matches:
    - path:
        type: PathPrefix
        value: /servicenow/table/openapi/mcp
    - path:
        type: PathPrefix
        value: /.well-known/oauth-protected-resource/servicenow/table/openapi/mcp
    - path:
        type: PathPrefix
        value: /.well-known/oauth-authorization-server/servicenow/table/openapi/mcp
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: servicenow-table-openapi-policy
  namespace: agentgateway-system
spec:
  backend:
    tls: {}
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: servicenow-table-openapi-mcp
  traffic:
    cors:
      allowCredentials: false
      allowHeaders:
      - '*'
      allowMethods:
      - '*'
      allowOrigins:
      - '*'
      maxAge: 5
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: servicenow-table-openapi-authn
  namespace: agentgateway-system
spec:
  backend:
    mcp:
      authentication:
        audiences:
        - api://REDACTED
        issuer: https://sts.windows.net/REDACTED/
        jwks:
          backendRef:
            group: agentgateway.dev
            kind: AgentgatewayBackend
            name: entra-jwks
          cacheDuration: 5m
          jwksPath: REDACTED/discovery/v2.0/keys
        mode: Strict
        resourceMetadata:
          agentgateway.dev/issuer-proxy: http://enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777/oauth-issuer
          authorizationServers:
          - https://mcp.servebeer.com/servicenow/table/openapi/mcp
          resource: https://mcp.servebeer.com/servicenow/table/openapi/mcp
          scopesSupported:
          - api://REDACTED/agentgateway
  targetRefs:
  - group: enterpriseagentgateway.solo.io
    kind: EnterpriseAgentgatewayBackend
    name: ent-servicenow-openapi-backend
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: servicenow-table-openapi-exchange
  namespace: agentgateway-system
spec:
  backend:
    tokenExchange:
      elicitation:
        secretName: servicenow-table-openapi-token-exchange
  targetRefs:
  - group: enterpriseagentgateway.solo.io
    kind: EnterpriseAgentgatewayBackend
    name: ent-servicenow-openapi-backend
---
apiVersion: v1
kind: Secret
metadata:
  name: servicenow-table-openapi-token-exchange
  namespace: agentgateway-system
type: Opaque
stringData:
  app_id: servicenow
  client_id: "REDACTED"
  client_secret: "REDACTED"
  authorize_url: "https://dev364551.service-now.com/oauth_auth.do"
  access_token_url: "https://dev364551.service-now.com/oauth_token.do"
  scopes: "useraccount"
  mcp_resource: "/servicenow/table/openapi/mcp"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: servicenow-table-openapi-schema
  namespace: agentgateway-system
data:
  schema: |
    {"openapi":"3.0.3","info":{"title":"ServiceNow IT Service Management (ITSM)","description":"ServiceNow..."}, "...truncated..."}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: entra-jwks
  namespace: agentgateway-system
spec:
  policies:
    tls: {}
  static:
    host: login.microsoftonline.com
    port: 443
